name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Bootstrap (restore)
        run: dotnet restore PodBridge.slnx

      - name: Verify
        run: powershell -NoProfile -File build/verify.ps1
