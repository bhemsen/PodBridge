name: CodeQL

# C# code scanning for the repo's Security tab. Runs on push to main and on every
# pull request. CodeQL's C# analysis needs a real build step because the solution
# uses a .slnx (autobuild does not reliably discover it), so this workflow builds
# PodBridge.slnx in Release explicitly between init and analyze.
#
# Third-party actions are pinned to full commit SHAs (issue #123).
#
# Spec: docs/specs/spec-release-1.0.md
# Research: docs/research/release-1.0.md (§3)

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze:
    name: Analyze (csharp)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: '10.0.x'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          languages: csharp

      - name: Build (manual, autobuild misses the slnx)
        run: dotnet build PodBridge.slnx -c Release

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          category: '/language:csharp'
