name: CodeQL

# C# code scanning for the repo's Security tab. Runs on push to main and on every
# pull request. CodeQL's C# analysis needs a real build step because the solution
# uses a .slnx (autobuild does not reliably discover it), so this workflow builds
# PodBridge.slnx in Release explicitly between init and analyze.
#
# Third-party actions are pinned to full commit SHAs (issue #123).
#
# Spec: docs/specs/spec-release-1.0.md
# Research: docs/research/release-1.0.md (§3)

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze:
    name: Analyze (csharp)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: '10.0.x'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@02c5e83432fe5497fd85b873b6c9f16a8578e1d9 # v3.37.0
        with:
          languages: csharp

      - name: Build (manual, autobuild misses the slnx)
        run: dotnet build PodBridge.slnx -c Release

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@02c5e83432fe5497fd85b873b6c9f16a8578e1d9 # v3.37.0
        with:
          category: '/language:csharp'
