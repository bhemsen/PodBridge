name: Dependency Review

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          comment-summary-in-pr: always

  vulnerable-packages:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: '10.0.x'

      - name: Bootstrap (restore)
        run: dotnet restore PodBridge.slnx

      - name: Check for known-vulnerable packages
        shell: pwsh
        run: |
          $output = dotnet list PodBridge.slnx package --vulnerable --include-transitive 2>&1 | Tee-Object -Variable rawOutput
          $rawOutput | Write-Host
          if ($rawOutput -match 'has the following vulnerable packages') {
            Write-Error "Known-vulnerable NuGet packages detected. See output above."
            exit 1
          }
