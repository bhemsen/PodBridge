name: Dependency Review

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Dependency Review
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          comment-summary-in-pr: always

  vulnerable-packages:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: '10.0.x'

      - name: Bootstrap (restore)
        run: dotnet restore PodBridge.slnx

      - name: Check for known-vulnerable packages
        shell: pwsh
        run: |
          $output = dotnet list PodBridge.slnx package --vulnerable --include-transitive 2>&1 | Tee-Object -Variable rawOutput
          $rawOutput | Write-Host
          if ($rawOutput -match 'has the following vulnerable packages') {
            Write-Error "Known-vulnerable NuGet packages detected. See output above."
            exit 1
          }
