name: Dependency Review

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Dependency Review
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          comment-summary-in-pr: always

  vulnerable-packages:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: '10.0.x'

      - name: Bootstrap (restore)
        run: dotnet restore PodBridge.slnx

      - name: Check for known-vulnerable packages
        shell: pwsh
        run: |
          $output = dotnet list PodBridge.slnx package --vulnerable --include-transitive 2>&1 | Tee-Object -Variable rawOutput
          $rawOutput | Write-Host
          if ($rawOutput -match 'has the following vulnerable packages') {
            Write-Error "Known-vulnerable NuGet packages detected. See output above."
            exit 1
          }
