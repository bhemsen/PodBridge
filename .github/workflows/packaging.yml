name: Package & Release (MSIX)

# Builds PodBridge.App into a signed MSIX on windows-latest and publishes it as a
# workflow artifact. This is separate from the dotnet-based Verify gate (ci.yml):
# the MSIX is produced from a Windows Application Packaging Project (.wapproj),
# which only MSBuild can build, so it is intentionally kept out of PodBridge.slnx.
#
# Signing uses a self-signed, throwaway certificate generated in-workflow (its
# Subject matches the manifest Publisher "CN=PodBridge (Self-Signed CI)"). The
# Store-signed, no-admin channel uses a Partner-Center-derived identity applied
# later at Store association (#38); this workflow does not need any secret.
#
# RELEASE CHANNEL (self-signed manual fallback, issue #36): pushing a semver tag
# `vMAJOR.MINOR.PATCH` reuses the very same build+sign steps below and then
# attaches the signed MSIX plus its matching trust certificate (.cer) to a GitHub
# Release. This is the documented MANUAL FALLBACK, not the no-admin path: users
# must one-time-trust the bundled .cer (see packaging/README.md). The primary
# no-admin channel is the Microsoft Store (winget `-s msstore`), which becomes
# live only after Store certification (#38); it needs no signing secret here.

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

jobs:
  msix:
    runs-on: windows-latest
    # Needed only by the "Publish GitHub Release" step (tag builds); harmless on
    # branch/PR runs, where that step is skipped.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Restore app for win-x64
        run: dotnet restore src/PodBridge.App/PodBridge.App.csproj -r win-x64

      - name: Generate self-signed signing certificate
        id: cert
        shell: pwsh
        run: |
          $cert = New-SelfSignedCertificate `
            -Type Custom `
            -Subject 'CN=PodBridge (Self-Signed CI)' `
            -KeyUsage DigitalSignature `
            -FriendlyName 'PodBridge CI throwaway' `
            -CertStoreLocation 'Cert:\CurrentUser\My' `
            -TextExtension @('2.5.29.37={text}1.3.6.1.5.5.7.3.3', '2.5.29.19={text}Subject Type:End Entity')
          $cer = Join-Path $env:RUNNER_TEMP 'PodBridge-SelfSigned.cer'
          Export-Certificate -Cert $cert -FilePath $cer | Out-Null
          "thumbprint=$($cert.Thumbprint)" >> $env:GITHUB_OUTPUT
          "cer=$cer" >> $env:GITHUB_OUTPUT

      - name: Stamp package version from tag (release builds only)
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          # A release tag "vMAJOR.MINOR.PATCH" sets the MSIX <Identity Version>
          # to "MAJOR.MINOR.PATCH.0" so each release carries a meaningful version.
          # Fail loudly on a malformed tag rather than shipping a mis-versioned
          # package. The manifest in the repo keeps its default for branch builds.
          $tag = $env:GITHUB_REF_NAME
          if ($tag -notmatch '^v(\d+)\.(\d+)\.(\d+)$') {
            Write-Error "Release tag '$tag' must be vMAJOR.MINOR.PATCH (e.g. v0.1.0)."; exit 1
          }
          $version = "$($Matches[1]).$($Matches[2]).$($Matches[3]).0"
          $manifestPath = (Resolve-Path 'packaging/PodBridge.Package/Package.appxmanifest').ProviderPath
          $xml = [xml](Get-Content -LiteralPath $manifestPath -Raw)
          $xml.Package.Identity.Version = $version
          $xml.Save($manifestPath)
          Write-Host "Stamped MSIX Identity Version = $version (from tag $tag)."

      - name: Build MSIX (.wapproj) via MSBuild
        shell: pwsh
        run: |
          # Target the newest UAP platform SDK actually installed on the runner
          # (the image may not carry the app's exact 10.0.22621.0 UAP SDK); the
          # package min-OS stays at the manifest's value.
          $uapRoot = 'C:\Program Files (x86)\Windows Kits\10\Platforms\UAP'
          $platforms = @(Get-ChildItem $uapRoot -Directory -ErrorAction SilentlyContinue | Select-Object -ExpandProperty Name)
          Write-Host "Installed UAP platform SDKs: $($platforms -join ', ')"
          $tpv = $platforms | Sort-Object { [version]$_ } -Descending | Select-Object -First 1
          if (-not $tpv) { Write-Error 'No UAP platform SDK on this runner; .wapproj cannot build headlessly.'; exit 1 }
          Write-Host "Using PbUapSdk=$tpv"
          $out = Join-Path $env:GITHUB_WORKSPACE 'artifacts\msix\'
          msbuild packaging/PodBridge.Package/PodBridge.Package.wapproj /restore /p:Configuration=Release /p:Platform=x64 /p:PbUapSdk=$tpv /p:UapAppxPackageBuildMode=SideLoadOnly /p:AppxBundle=Never /p:AppxPackageSigningEnabled=false /p:GenerateTemporaryStoreCertificate=false /p:AppxPackageDir="$out"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Locate the produced MSIX
        id: find
        shell: pwsh
        run: |
          $msix = Get-ChildItem -Path (Join-Path $env:GITHUB_WORKSPACE 'artifacts\msix') -Recurse -Filter *.msix | Select-Object -First 1
          if (-not $msix) { Write-Error 'No .msix was produced by the packaging build.'; exit 1 }
          Write-Host "Produced: $($msix.FullName)"
          "msix=$($msix.FullName)" >> $env:GITHUB_OUTPUT

      - name: Locate Windows SDK tools
        id: sdk
        shell: pwsh
        run: |
          $signtool = Get-ChildItem 'C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe' | Sort-Object FullName -Descending | Select-Object -First 1
          $makeappx = Get-ChildItem 'C:\Program Files (x86)\Windows Kits\10\bin\*\x64\makeappx.exe' | Sort-Object FullName -Descending | Select-Object -First 1
          if (-not $signtool) { Write-Error 'signtool.exe not found'; exit 1 }
          if (-not $makeappx) { Write-Error 'makeappx.exe not found'; exit 1 }
          "signtool=$($signtool.FullName)" >> $env:GITHUB_OUTPUT
          "makeappx=$($makeappx.FullName)" >> $env:GITHUB_OUTPUT

      - name: Sign the MSIX (self-signed, throwaway)
        shell: pwsh
        run: |
          $msix = '${{ steps.find.outputs.msix }}'
          & '${{ steps.sdk.outputs.signtool }}' sign /fd SHA256 /sha1 '${{ steps.cert.outputs.thumbprint }}' $msix
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          # A self-signed cert is intentionally NOT trusted on the runner, so
          # `signtool verify /pa` (full chain trust) would fail by design. Assert
          # instead that the package carries our expected signer identity.
          $sig = Get-AuthenticodeSignature -FilePath $msix
          Write-Host "Signature status: $($sig.Status); signer: $($sig.SignerCertificate.Subject)"
          if ($sig.SignerCertificate -and $sig.SignerCertificate.Subject -ne 'CN=PodBridge (Self-Signed CI)') {
            Write-Error "Unexpected signer subject: $($sig.SignerCertificate.Subject)"; exit 1
          }
          Write-Host 'OK: MSIX signed by the expected self-signed identity (untrusted chain expected for a throwaway cert).'

      - name: Assert app-only (no kernel driver in the package)
        shell: pwsh
        run: |
          $dest = Join-Path $env:RUNNER_TEMP 'msix-unpack'
          & '${{ steps.sdk.outputs.makeappx }}' unpack /p '${{ steps.find.outputs.msix }}' /d $dest /o
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $sys = Get-ChildItem -Path $dest -Recurse -Include *.sys -ErrorAction SilentlyContinue
          if ($sys) { Write-Error "Kernel driver (.sys) found in package - MSIX must be app-only."; exit 1 }
          Write-Host 'OK: no .sys driver payload in the package (app-only).'

      - name: Upload signed MSIX + trust certificate
        uses: actions/upload-artifact@v4
        with:
          name: PodBridge-msix
          if-no-files-found: error
          path: |
            ${{ steps.find.outputs.msix }}
            ${{ steps.cert.outputs.cer }}

      - name: Publish GitHub Release (release builds only)
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Self-signed manual-fallback channel (issue #36): attach the signed
          # MSIX and its matching trust certificate to a GitHub Release. The .cer
          # is required because a self-signed signer is not trusted by default -
          # users import it once (admin) into LocalMachine\TrustedPeople before
          # installing (packaging/README.md). This is NOT the no-admin path; the
          # Store channel (winget -s msstore, #38) is, and needs no cert step.
          # Notes come from a committed template (no here-string: a PowerShell
          # here-string cannot live inside a YAML block scalar).
          $tag = $env:GITHUB_REF_NAME
          $msix = '${{ steps.find.outputs.msix }}'
          $cer = '${{ steps.cert.outputs.cer }}'
          # A downloaded asset keeps its on-disk basename; the `#label` suffix is
          # only a cosmetic display label (gh release create), NOT the filename.
          # The .wapproj emits `PodBridgeContributors.PodBridge_*_x64.msix`, but
          # the install docs tell users to run `Add-AppxPackage -Path
          # .\PodBridge-<tag>.msix`. Copy to that exact name so the documented
          # command resolves. (The .cer's on-disk name already matches its label.)
          $msixAsset = Join-Path $env:RUNNER_TEMP "PodBridge-$tag.msix"
          Copy-Item -LiteralPath $msix -Destination $msixAsset -Force
          $notes = Join-Path $env:RUNNER_TEMP 'release-notes.md'
          $template = Get-Content -LiteralPath 'packaging/release-notes.template.md' -Raw
          $template.Replace('__TAG__', $tag) | Set-Content -LiteralPath $notes -Encoding utf8
          gh release create $tag `
            $msixAsset `
            "$cer#PodBridge-SelfSigned.cer" `
            --title "PodBridge $tag" `
            --notes-file $notes `
            --verify-tag
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          Write-Host "OK: published GitHub Release $tag with the signed MSIX + trust certificate."
