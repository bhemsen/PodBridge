name: Release

# Tag-triggered release workflow (release-1.0, issue #122): publishes a
# self-contained, single-file .exe per RID (win-x64, win-arm64) plus its PDB,
# a checksums.sha256 (exe assets), a CycloneDX SBOM, and a build-provenance
# attestation, then creates a GitHub Release with all of it attached. This is
# independent of the dotnet-based Verify gate (ci.yml) and does not change the
# plain `dotnet build`/Verify path.
#
# workflow_dispatch runs the full publish/SBOM/attestation pipeline (useful to
# test the pipeline itself) but only cuts a real GitHub Release on an actual
# `v*` tag push.
#
# NOTE: the old MSIX channel (packaging.yml) also triggered on `v*` and would
# have raced this workflow to create the same GitHub Release; it was retired
# in issue #124 (Phase-5 MSIX/Store superseded, #38 closed) before the real
# `v1.0.0` tag (issue #127) is pushed.
#
# NOTE: LICENSE, NOTICE, and THIRD-PARTY-NOTICES.md are still loose <Content>
# files copied beside the exe at build time (embedding them as resources
# inside the exe itself is issue #116, open, no PR ordering dependency here).
# Until #116 lands, this workflow copies those three root files straight into
# release-assets so every v* tag Release stays Apache-2.0 §4-compliant (license
# text + NOTICE distributed with the binary) regardless of #116's landing
# order; #116 additionally makes the running exe itself sidecar-free.
#
# Third-party actions are pinned to full commit SHAs (issue #123).
#
# Spec: docs/specs/spec-release-1.0.md
# Research: docs/research/release-1.0.md (§1, §3)

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to stamp, e.g. 1.0.0 (required for manual runs; ignored on a v* tag push).'
        required: false
        type: string

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  version:
    runs-on: windows-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Determine release version
        id: version
        shell: pwsh
        env:
          DISPATCH_VERSION: ${{ inputs.version }}
        run: |
          # Tag pushes stamp the version from the tag itself ("vMAJOR.MINOR.PATCH"
          # -> "MAJOR.MINOR.PATCH"); a manual workflow_dispatch run must supply the
          # 'version' input instead, since there is no tag to read it from.
          $ref = '${{ github.ref }}'
          if ($ref -like 'refs/tags/v*') {
            $version = $ref.Substring('refs/tags/v'.Length)
          } elseif ($env:DISPATCH_VERSION) {
            $version = $env:DISPATCH_VERSION
          } else {
            Write-Error "Manual runs need a 'version' input (e.g. 1.0.0) when not triggered by a v* tag push."
            exit 1
          }
          if ($version -notmatch '^\d+\.\d+\.\d+(-[0-9A-Za-z.]+)?$') {
            Write-Error "Version '$version' must be MAJOR.MINOR.PATCH, optionally with a -PRERELEASE suffix (e.g. 1.0.0 or 1.0.0-rc.1)."
            exit 1
          }
          Write-Host "Release version: $version"
          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=v$version" >> $env:GITHUB_OUTPUT

  publish:
    needs: version
    runs-on: windows-latest
    strategy:
      matrix:
        rid: [win-x64, win-arm64]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: '10.0.x'

      - name: Restore (${{ matrix.rid }})
        run: dotnet restore src/PodBridge.App/PodBridge.App.csproj -r ${{ matrix.rid }}

      - name: Publish self-contained single-file exe (${{ matrix.rid }})
        run: >-
          dotnet publish src/PodBridge.App -c Release -r ${{ matrix.rid }}
          -p:PublishSingleFile=true -p:ContinuousIntegrationBuild=true
          -p:Version=${{ needs.version.outputs.version }}
          -o publish/${{ matrix.rid }}

      - name: Rename published exe + pdb to the release asset names
        id: rename
        shell: pwsh
        run: |
          $rid = '${{ matrix.rid }}'
          $version = '${{ needs.version.outputs.version }}'
          $src = "publish/$rid/PodBridge.App.exe"
          $srcPdb = "publish/$rid/PodBridge.App.pdb"
          if (-not (Test-Path -LiteralPath $src)) {
            Write-Error "Expected published exe not found: $src"; exit 1
          }
          $destName = "PodBridge-$version-$rid.exe"
          New-Item -ItemType Directory -Force -Path 'release-assets' | Out-Null
          $dest = "release-assets/$destName"
          Copy-Item -LiteralPath $src -Destination $dest -Force
          # The PDB is OPTIONAL: a self-contained single-file publish does not emit
          # a loose PodBridge.App.pdb next to the exe (debug info stays embedded /
          # in the bundle). Attach it only when present; never block the release on
          # its absence — the exe + checksum + SBOM + attestation are the deliverables.
          $destPdbName = ''
          if (Test-Path -LiteralPath $srcPdb) {
            $destPdbName = "PodBridge-$version-$rid.pdb"
            Copy-Item -LiteralPath $srcPdb -Destination "release-assets/$destPdbName" -Force
          } else {
            Write-Host "No loose PDB at $srcPdb (embedded / not produced by single-file publish) - skipping."
          }
          $sizeMb = [math]::Round((Get-Item -LiteralPath $dest).Length / 1MB, 1)
          $pdbSuffix = if ($destPdbName) { " + $destPdbName" } else { '' }
          Write-Host "Published $destName ($sizeMb MB)$pdbSuffix"
          "name=$destName" >> $env:GITHUB_OUTPUT
          "pdb_name=$destPdbName" >> $env:GITHUB_OUTPUT
          "size_mb=$sizeMb" >> $env:GITHUB_OUTPUT

      - name: Upload exe + pdb artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: podbridge-exe-${{ matrix.rid }}
          # Globs the exe (always) plus the pdb (only when single-file publish
          # emitted a loose one); each matrix job's release-assets holds only its
          # own RID's files.
          path: release-assets/PodBridge-*
          if-no-files-found: error

  release:
    needs: [version, publish]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: '10.0.x'

      - name: Download published exes + pdbs
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: podbridge-exe-*
          path: release-assets
          merge-multiple: true

      - name: Generate checksums.sha256
        shell: pwsh
        run: |
          $exes = Get-ChildItem release-assets/*.exe | Sort-Object Name
          if (-not $exes) { Write-Error 'No published exe assets found to checksum.'; exit 1 }
          $lines = foreach ($exe in $exes) {
            $hash = (Get-FileHash -LiteralPath $exe.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
            "$hash *$($exe.Name)"
          }
          Set-Content -LiteralPath release-assets/checksums.sha256 -Value $lines -Encoding ascii
          Write-Host (Get-Content -LiteralPath release-assets/checksums.sha256 -Raw)

      - name: Copy legal files into release assets
        shell: pwsh
        run: |
          # Apache-2.0 §4: a redistributed binary must carry its own license text
          # + NOTICE attribution. LICENSE/NOTICE/THIRD-PARTY-NOTICES.md are still
          # loose <Content> files copied beside the exe at build time (embedding
          # them inside the exe itself is issue #116, open with no landing-order
          # dependency on this workflow). Attaching the root copies to the Release
          # here keeps every v* tag compliant regardless of that ordering.
          foreach ($f in 'LICENSE', 'NOTICE', 'THIRD-PARTY-NOTICES.md') {
            if (-not (Test-Path -LiteralPath $f)) {
              Write-Error "Expected legal file not found at repo root: $f"; exit 1
            }
            Copy-Item -LiteralPath $f -Destination "release-assets/$f" -Force
          }

      - name: Restore solution (for SBOM generation)
        run: dotnet restore PodBridge.slnx

      - name: Generate CycloneDX SBOM
        shell: pwsh
        run: |
          dotnet tool install --global CycloneDX
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          dotnet CycloneDX PodBridge.slnx -o sbom
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Copy SBOM into the release assets
        id: sbom
        shell: pwsh
        run: |
          $bom = Get-ChildItem -LiteralPath sbom -File | Select-Object -First 1
          if (-not $bom) { Write-Error 'CycloneDX did not produce an SBOM file in ./sbom.'; exit 1 }
          Copy-Item -LiteralPath $bom.FullName -Destination "release-assets/$($bom.Name)"
          Write-Host "SBOM: $($bom.Name)"
          "name=$($bom.Name)" >> $env:GITHUB_OUTPUT

      - name: Attest build provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-path: release-assets/PodBridge-*.exe

      - name: Compose release notes
        id: notes
        shell: pwsh
        run: |
          # Honest release notes: driver-free Tier-1 scope, the expected first-run
          # SmartScreen warning for an unsigned exe (docs/research/release-1.0.md §2),
          # and how to verify the download (checksum + provenance attestation).
          $tag = '${{ needs.version.outputs.tag }}'
          $sizeLines = (Get-ChildItem release-assets/*.exe | Sort-Object Name | ForEach-Object {
            $mb = [math]::Round($_.Length / 1MB, 1)
            "- ``$($_.Name)``: $mb MB"
          }) -join "`n"
          $notes = @"
          ## PodBridge $tag

          Self-contained, single-file ``.exe`` per architecture — download and run,
          no installer, no admin rights.

          ### Scope (driver-free Tier-1)
          Battery, automatic play/pause, codec transparency, and the
          microphone-profile policy. Runs ``asInvoker`` — no admin rights and no
          kernel driver. Advanced features (noise-control switching, gesture
          remap) are a separate, explicitly opt-in add-on and are not part of
          this release.

          ### First run: expect a SmartScreen warning
          This build is unsigned; it is verified instead by a build-provenance
          attestation, a checksum, and an SBOM (see below). On first run Windows
          SmartScreen will likely show "Windows protected your PC / Unknown
          publisher" — click **More info -> Run anyway**. That is expected for an
          unsigned download and does not by itself indicate a problem with the
          file.

          ### Verify your download
          1. **Checksum:** ``certutil -hashfile <exe> SHA256`` and compare the
             result against the matching line in ``checksums.sha256``.
          2. **Build provenance:**
             ``gh attestation verify <exe> -R bhemsen/PodBridge``
          3. **SBOM:** the attached CycloneDX SBOM lists every package this build
             was compiled against.

          ### Measured size
          $sizeLines

          ### Also attached
          - ``LICENSE``, ``NOTICE``, and ``THIRD-PARTY-NOTICES.md`` (Apache-2.0 §4).
          - A matching ``.pdb`` per architecture when the single-file build emits
            one (debug info is otherwise embedded in the exe).

          ---
          Not affiliated with, authorized, or endorsed by Apple Inc.
          "@
          $notesPath = Join-Path $env:RUNNER_TEMP 'release-notes.md'
          Set-Content -LiteralPath $notesPath -Value $notes -Encoding utf8
          Write-Host $notes
          "path=$notesPath" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = '${{ needs.version.outputs.tag }}'
          $assets = Get-ChildItem release-assets -File | Select-Object -ExpandProperty FullName
          gh release create $tag $assets --title "PodBridge $tag" --notes-file '${{ steps.notes.outputs.path }}' --verify-tag
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          Write-Host "OK: published GitHub Release $tag with $($assets.Count) asset(s)."
